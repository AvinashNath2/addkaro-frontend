<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AddKaro</title>
  <script>
    // GitHub Pages SPA routing: when a user navigates directly to a deep link
    // (e.g. /addkaro-frontend/browse), GitHub serves this 404.html.
    // This script encodes the path into a query string and redirects to index.html,
    // which then decodes it and restores the correct URL via History API.
    var pathSegmentsToKeep = 1; // keep /addkaro-frontend
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
